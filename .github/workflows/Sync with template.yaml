name: Sync with template

on:
  schedule:
    - cron: '0 4 * * 1' # Runs every Monday at 04:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Push Template Branch
        env:
          TEMPLATE_URL: 'https://github.com/szymciogrosik/angular-firebase-accelerator.git'
          TEMPLATE_BRANCH: 'main'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add template $TEMPLATE_URL
          git fetch template

          # Create a dedicated branch for the sync based exactly on the template's state
          BRANCH_NAME="sync-template-$(date +'%Y-%m-%d')"
          git checkout -b $BRANCH_NAME template/$TEMPLATE_BRANCH

          # Push the branch to origin in case it doesn't exist, overwrite if it does
          git push -f origin $BRANCH_NAME

          # Create Pull Request via GitHub CLI
          gh pr create \
            --title "Sync template changes: $(date +'%Y-%m-%d')" \
            --body "Automated PR to sync updates from the upstream template. If there are merge conflicts, you can resolve them directly in the GitHub web UI or locally." \
            --base main \
            --head $BRANCH_NAME || echo "No changes to PR, or PR already exists."
