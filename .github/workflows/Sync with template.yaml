name: Sync with template

on:
  schedule:
    - cron: '0 4 * * 1' # Runs every Monday at 04:00 UTC
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch and Push Template Branch
        env:
          TEMPLATE_URL: 'https://github.com/szymciogrosik/angular-firebase-accelerator.git'
          TEMPLATE_BRANCH: 'main'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote add template $TEMPLATE_URL
          git fetch template main

          # Create a dedicated branch for the sync based exactly on the local main's state
          BRANCH_NAME="sync-template-$(date +'%Y-%m-%d')"
          git checkout -b $BRANCH_NAME

          # Perform a raw merge. 
          # We use || true so conflicts don't instantly stop the GitHub Action runner.
          # The conflicting files (with <<<<<<< HEAD markers) will remain in the working directory.
          git merge template/$TEMPLATE_BRANCH --no-commit --allow-unrelated-histories || true

          # Restore local workflows to prevent GitHub Actions permission errors
          git checkout HEAD -- .github/workflows || true

          # Commit all incoming changes (and any unresolved conflict markers) to this branch
          git add -A
          git commit -m "chore: sync upstream template updates (contains conflicts if any)" || { echo "No changes from template to sync."; exit 0; }

          # Push the branch to origin in case it doesn't exist, overwrite if it does
          git push -f origin $BRANCH_NAME

          # Create Pull Request via GitHub CLI
          gh pr create \
            --title "Sync template changes: $(date +'%Y-%m-%d')" \
            --body "Automated PR to sync updates from the upstream template. This branch shares history with main. If there are merge conflicts, you can resolve them directly in the GitHub web UI or locally." \
            --base main \
            --head $BRANCH_NAME || echo "No changes to PR, or PR already exists."
