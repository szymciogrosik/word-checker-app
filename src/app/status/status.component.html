<div class="app-page-container">
  <mat-card class="app-card-narrow">
    <mat-card-title>
      <h2>{{ 'status.lastBuildTime' | translate }}</h2>
    </mat-card-title>
    <mat-card-content>
      @if (lastDeployTime) {
        <div [innerHTML]="lastDeployTime" style="text-align: center;"></div>
      }
      @if (!lastDeployTime) {
        <div>
          <mat-spinner [diameter]="80"></mat-spinner>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
